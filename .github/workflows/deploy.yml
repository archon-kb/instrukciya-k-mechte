# Деплой на GitHub Pages: корень сайта = старый макет (витрина команды не мигает),
# новое Vite/React-приложение живёт на /preview/ до эталонного состояния.
# Когда новый сайт станет главным: поменять местами сборку артефакта (dist в корень)
# и убрать base '/instrukciya-k-mechte/preview/' из vite.config.ts.
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Собрать артефакт (макет в корне, приложение в /preview)
        run: |
          mkdir -p _site/preview
          cp -R site-mockup/. _site/
          cp -R dist/. _site/preview/
          touch _site/.nojekyll
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
